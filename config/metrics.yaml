          SUM((COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))/1000.0/3600.0) AS drv_kwh
        FROM t
      )
      SELECT
        'DrvEng_T' AS metric_id,
        '驱动电机平均功率(全程)(kW)' AS metric_name,
        CASE WHEN hours>0 THEN drv_kwh/hours ELSE NULL END AS metric_value,
        'kW' AS metric_unit
      FROM base;

  - id: AuxEng_T
    name: "整车附件平均功率(全程)(kW)"
    unit: "kW"
    prompt_sql: >
      WITH base AS (
        SELECT
          COUNT(*)/3600.0 AS hours,
          (
            (
              (
                SUM((COALESCE(TRY_CAST(DcfCurrOut AS DOUBLE),0)*COALESCE(TRY_CAST(DcfVoltOut AS DOUBLE),0))/1000.0/3600.0)
                - SUM((COALESCE(TRY_CAST(WcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(WcpVolt AS DOUBLE),0))/1000.0/3600.0)
                - SUM((COALESCE(TRY_CAST(HrbCurr AS DOUBLE),0)*COALESCE(TRY_CAST(HrbVolt AS DOUBLE),0))/1000.0/3600.0)
                - SUM((COALESCE(TRY_CAST(AcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(AcpVolt AS DOUBLE),0))/1000.0/3600.0)
              )
              + SUM((COALESCE(TRY_CAST(BattCurr AS DOUBLE),0)*COALESCE(TRY_CAST(BattVolt AS DOUBLE),0))/1000.0/3600.0)
            )
            - SUM((COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))/1000.0/3600.0)
          ) AS aux_kwh
        FROM t
      )
      SELECT
        'AuxEng_T' AS metric_id,
        '整车附件平均功率(全程)(kW)' AS metric_name,
        CASE WHEN hours>0 THEN aux_kwh/hours ELSE NULL END AS metric_value,
        'kW' AS metric_unit
      FROM base;

