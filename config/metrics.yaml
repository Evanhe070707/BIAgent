# ========= 列名映射 =========
# 将 CSV 中的实际列名映射到指标 SQL 使用的短名。
# 每个短名对应一个候选列名列表，匹配时取第一个存在的列。
column_aliases:
  VehSpd:
    - "IC_Tachograph_VehicleSpeed[km/h]"
    - "TBOX_Speed_Trf[km/h]"
  BattCurr:
    - "BMS_TotalCurrent[A]"
  BattVolt:
    - "BMS_TotalVolt[V]"
  MotCurr:
    - "MCU_I_Curr[A]"
  MotVolt:
    - "MCU_U_Volt[V]"
  StkCurr:
    - "FCU_StackCurr[A]"
    - "SPM_I_StkCurr[A]"
  StkVolt:
    - "FCU_StackVolt[V]"
    - "SPM_U_StkVolt[V]"
  DcfCurrOut:
    - "FCU_DCFCurrOut[A]"
    - "SPM_I_DCFCurrOut[A]"
    - "DCDC_OutputCurr[A]"
  DcfVoltOut:
    - "FCU_DCFVoltOut[V]"
    - "SPM_U_DCFVoltOut[V]"
    - "DCDC_OutputVolt[V]"
  WcpCurr:
    - "AirCmpCurrent[A]"
  WcpVolt:
    - "AirCmpVoltage[V]"
  HrbCurr:
    - "HDC_I_HRBCurr[A]"
    - "H2PumpCurrent[A]"
  HrbVolt:
    - "HDC_U_HRBVolt[V]"
    - "H2PumpVoltage[V]"
  AcpCurr:
    - "ADC_I_ACPCurr[A]"
    - "IPF_AcpMotorCurrentTrf[A]"
  AcpVolt:
    - "ADC_U_ACPVolt[V]"
    - "IPF_AcpMotorVoltageTrf"

metrics:

  # ========= 时间 / 距离 =========
  - id: TimeReady
    name: "整备时长(s)"
    unit: "s"
    prompt_sql: >
      SELECT
        'TimeReady' AS metric_id,
        '整备时长(s)' AS metric_name,
        COUNT(*) * 1.0 AS metric_value,
        's' AS metric_unit
      FROM t;

  - id: TimeDrv
    name: "行驶时长(s)"
    unit: "s"
    prompt_sql: >
      SELECT
        'TimeDrv' AS metric_id,
        '行驶时长(s)' AS metric_name,
        SUM(CASE WHEN COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)>0 THEN 1 ELSE 0 END) * 1.0 AS metric_value,
        's' AS metric_unit
      FROM t;

  - id: TimeStop
    name: "怠速时长(s)"
    unit: "s"
    prompt_sql: >
      SELECT
        'TimeStop' AS metric_id,
        '怠速时长(s)' AS metric_name,
        SUM(CASE WHEN COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)=0 THEN 1 ELSE 0 END) * 1.0 AS metric_value,
        's' AS metric_unit
      FROM t;

  - id: TimeFC
    name: "燃料电池运行时长(s)"
    unit: "s"
    prompt_sql: >
      SELECT
        'TimeFC' AS metric_id,
        '燃料电池运行时长(s)' AS metric_name,
        SUM(CASE WHEN COALESCE(TRY_CAST(StkCurr AS DOUBLE),0)>0 THEN 1 ELSE 0 END) * 1.0 AS metric_value,
        's' AS metric_unit
      FROM t;

  - id: TotalDist
    name: "总行驶里程(km)"
    unit: "km"
    prompt_sql: >
      SELECT
        'TotalDist' AS metric_id,
        '总行驶里程(km)' AS metric_name,
        SUM(COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)/3600.0) AS metric_value,
        'km' AS metric_unit
      FROM t;

  # ========= 能量（kWh）=========
  - id: StkEng_all
    name: "电堆总输出电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      SELECT
        'StkEng_all' AS metric_id,
        '电堆总输出电能(kWh)' AS metric_name,
        SUM((COALESCE(TRY_CAST(StkCurr AS DOUBLE),0)*COALESCE(TRY_CAST(StkVolt AS DOUBLE),0))/1000.0/3600.0) AS metric_value,
        'kWh' AS metric_unit
      FROM t;

  - id: DcfOutEng_all
    name: "DC/DC输出总电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      SELECT
        'DcfOutEng_all' AS metric_id,
        'DC/DC输出总电能(kWh)' AS metric_name,
        SUM((COALESCE(TRY_CAST(DcfCurrOut AS DOUBLE),0)*COALESCE(TRY_CAST(DcfVoltOut AS DOUBLE),0))/1000.0/3600.0) AS metric_value,
        'kWh' AS metric_unit
      FROM t;

  - id: WcpEng_all
    name: "空压机总电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      SELECT
        'WcpEng_all' AS metric_id,
        '空压机总电能(kWh)' AS metric_name,
        SUM((COALESCE(TRY_CAST(WcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(WcpVolt AS DOUBLE),0))/1000.0/3600.0) AS metric_value,
        'kWh' AS metric_unit
      FROM t;

  - id: HrbEng_all
    name: "氢气循环泵总电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      SELECT
        'HrbEng_all' AS metric_id,
        '氢气循环泵总电能(kWh)' AS metric_name,
        SUM((COALESCE(TRY_CAST(HrbCurr AS DOUBLE),0)*COALESCE(TRY_CAST(HrbVolt AS DOUBLE),0))/1000.0/3600.0) AS metric_value,
        'kWh' AS metric_unit
      FROM t;

  - id: AcpEng_all
    name: "冷却泵总电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      SELECT
        'AcpEng_all' AS metric_id,
        '冷却泵总电能(kWh)' AS metric_name,
        SUM((COALESCE(TRY_CAST(AcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(AcpVolt AS DOUBLE),0))/1000.0/3600.0) AS metric_value,
        'kWh' AS metric_unit
      FROM t;

  - id: FCEng_all
    name: "燃料电池净输出总电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      SELECT
        'FCEng_all' AS metric_id,
        '燃料电池净输出总电能(kWh)' AS metric_name,
        (
          SUM((COALESCE(TRY_CAST(DcfCurrOut AS DOUBLE),0)*COALESCE(TRY_CAST(DcfVoltOut AS DOUBLE),0))/1000.0/3600.0)
          - SUM((COALESCE(TRY_CAST(WcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(WcpVolt AS DOUBLE),0))/1000.0/3600.0)
          - SUM((COALESCE(TRY_CAST(HrbCurr AS DOUBLE),0)*COALESCE(TRY_CAST(HrbVolt AS DOUBLE),0))/1000.0/3600.0)
          - SUM((COALESCE(TRY_CAST(AcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(AcpVolt AS DOUBLE),0))/1000.0/3600.0)
        ) AS metric_value,
        'kWh' AS metric_unit
      FROM t;

  - id: BattEng_all
    name: "动力电池总电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      SELECT
        'BattEng_all' AS metric_id,
        '动力电池总电能(kWh)' AS metric_name,
        SUM((COALESCE(TRY_CAST(BattCurr AS DOUBLE),0)*COALESCE(TRY_CAST(BattVolt AS DOUBLE),0))/1000.0/3600.0) AS metric_value,
        'kWh' AS metric_unit
      FROM t;

  - id: DrvEng_all
    name: "驱动电机总电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      SELECT
        'DrvEng_all' AS metric_id,
        '驱动电机总电能(kWh)' AS metric_name,
        SUM((COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))/1000.0/3600.0) AS metric_value,
        'kWh' AS metric_unit
      FROM t;

  - id: DrvEng_Pos_all
    name: "驱动电机驱动总电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      SELECT
        'DrvEng_Pos_all' AS metric_id,
        '驱动电机驱动总电能(kWh)' AS metric_name,
        SUM(
          CASE WHEN (COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))>0
               THEN (COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))/1000.0/3600.0
               ELSE 0 END
        ) AS metric_value,
        'kWh' AS metric_unit
      FROM t;

  - id: DrvEng_Neg_all
    name: "驱动电机回馈总电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      SELECT
        'DrvEng_Neg_all' AS metric_id,
        '驱动电机回馈总电能(kWh)' AS metric_name,
        SUM(
          CASE WHEN (COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))<0
               THEN -(COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))/1000.0/3600.0
               ELSE 0 END
        ) AS metric_value,
        'kWh' AS metric_unit
      FROM t;

  - id: VehEng_all
    name: "整车总电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      SELECT
        'VehEng_all' AS metric_id,
        '整车总电能(kWh)' AS metric_name,
        (
          (
            SUM((COALESCE(TRY_CAST(DcfCurrOut AS DOUBLE),0)*COALESCE(TRY_CAST(DcfVoltOut AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(WcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(WcpVolt AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(HrbCurr AS DOUBLE),0)*COALESCE(TRY_CAST(HrbVolt AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(AcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(AcpVolt AS DOUBLE),0))/1000.0/3600.0)
          )
          + SUM((COALESCE(TRY_CAST(BattCurr AS DOUBLE),0)*COALESCE(TRY_CAST(BattVolt AS DOUBLE),0))/1000.0/3600.0)
        ) AS metric_value,
        'kWh' AS metric_unit
      FROM t;

  - id: AuxEng_all
    name: "整车附件总电能(kWh)"
    unit: "kWh"
    prompt_sql: >
      WITH base AS (
        SELECT
          (
            (
              SUM((COALESCE(TRY_CAST(DcfCurrOut AS DOUBLE),0)*COALESCE(TRY_CAST(DcfVoltOut AS DOUBLE),0))/1000.0/3600.0)
              - SUM((COALESCE(TRY_CAST(WcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(WcpVolt AS DOUBLE),0))/1000.0/3600.0)
              - SUM((COALESCE(TRY_CAST(HrbCurr AS DOUBLE),0)*COALESCE(TRY_CAST(HrbVolt AS DOUBLE),0))/1000.0/3600.0)
              - SUM((COALESCE(TRY_CAST(AcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(AcpVolt AS DOUBLE),0))/1000.0/3600.0)
            )
            + SUM((COALESCE(TRY_CAST(BattCurr AS DOUBLE),0)*COALESCE(TRY_CAST(BattVolt AS DOUBLE),0))/1000.0/3600.0)
          ) AS veh_kwh,
          SUM((COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))/1000.0/3600.0) AS drv_kwh
        FROM t
      )
      SELECT
        'AuxEng_all' AS metric_id,
        '整车附件总电能(kWh)' AS metric_name,
        veh_kwh - drv_kwh AS metric_value,
        'kWh' AS metric_unit
      FROM base;

  # ========= 氢耗 =========
  - id: H2_all_long
    name: "总耗氢量(kg)"
    unit: "kg"
    prompt_sql: >
      SELECT
        'H2_all_long' AS metric_id,
        '总耗氢量(kg)' AS metric_name,
        SUM(
          (COALESCE(TRY_CAST(StkCurr AS DOUBLE), 0))
          / 2.016 / 96485 * 2
          / 3600
          * {{stk_cell_count}}
          / {{stk_h2_corr}}
        ) AS metric_value,
        'kg' AS metric_unit
      FROM t;

  - id: H2EleRatio
    name: "氢电转换比(kWh/kg)"
    unit: "kWh/kg"
    prompt_sql: >
      WITH base AS (
        SELECT
          (
            SUM((COALESCE(TRY_CAST(DcfCurrOut AS DOUBLE),0)*COALESCE(TRY_CAST(DcfVoltOut AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(WcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(WcpVolt AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(HrbCurr AS DOUBLE),0)*COALESCE(TRY_CAST(HrbVolt AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(AcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(AcpVolt AS DOUBLE),0))/1000.0/3600.0)
          ) AS fc_kwh,
          SUM(
            (COALESCE(TRY_CAST(StkCurr AS DOUBLE), 0))
            / 2.016 / 96485 * 2
            / 3600
            * {{stk_cell_count}}
            / {{stk_h2_corr}}
          ) AS h2_kg
        FROM t
      )
      SELECT
        'H2EleRatio' AS metric_id,
        '氢电转换比(kWh/kg)' AS metric_name,
        CASE WHEN h2_kg>0 THEN fc_kwh/h2_kg ELSE NULL END AS metric_value,
        'kWh/kg' AS metric_unit
      FROM base;

  - id: H_all_Long
    name: "整车等效耗氢量(kg)"
    unit: "kg"
    prompt_sql: >
      WITH base AS (
        SELECT
          (
            SUM((COALESCE(TRY_CAST(DcfCurrOut AS DOUBLE),0)*COALESCE(TRY_CAST(DcfVoltOut AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(WcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(WcpVolt AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(HrbCurr AS DOUBLE),0)*COALESCE(TRY_CAST(HrbVolt AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(AcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(AcpVolt AS DOUBLE),0))/1000.0/3600.0)
          ) AS fc_kwh,
          SUM((COALESCE(TRY_CAST(BattCurr AS DOUBLE),0)*COALESCE(TRY_CAST(BattVolt AS DOUBLE),0))/1000.0/3600.0) AS batt_kwh,
          SUM(
            (COALESCE(TRY_CAST(StkCurr AS DOUBLE), 0))
            / 2.016 / 96485 * 2
            / 3600
            * {{stk_cell_count}}
            / {{stk_h2_corr}}
          ) AS h2_kg
        FROM t
      )
      SELECT
        'H_all_Long' AS metric_id,
        '整车等效耗氢量(kg)' AS metric_name,
        CASE WHEN h2_kg>0 THEN h2_kg + batt_kwh/(fc_kwh/h2_kg) ELSE NULL END AS metric_value,
        'kg' AS metric_unit
      FROM base;

  - id: VehH_Dist
    name: "百公里等效氢耗(kg/100km)"
    unit: "kg/100km"
    prompt_sql: >
      WITH base AS (
        SELECT
          SUM(COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)/3600.0) AS dist_km,
          (
            SUM((COALESCE(TRY_CAST(DcfCurrOut AS DOUBLE),0)*COALESCE(TRY_CAST(DcfVoltOut AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(WcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(WcpVolt AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(HrbCurr AS DOUBLE),0)*COALESCE(TRY_CAST(HrbVolt AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(AcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(AcpVolt AS DOUBLE),0))/1000.0/3600.0)
          ) AS fc_kwh,
          SUM((COALESCE(TRY_CAST(BattCurr AS DOUBLE),0)*COALESCE(TRY_CAST(BattVolt AS DOUBLE),0))/1000.0/3600.0) AS batt_kwh,
          SUM(
            (COALESCE(TRY_CAST(StkCurr AS DOUBLE), 0))
            / 2.016 / 96485 * 2
            / 3600
            * {{stk_cell_count}}
            / {{stk_h2_corr}}
          ) AS h2_kg
        FROM t
      )
      SELECT
        'VehH_Dist' AS metric_id,
        '百公里等效氢耗(kg/100km)' AS metric_name,
        CASE WHEN dist_km>0 AND h2_kg>0
             THEN (h2_kg + batt_kwh/(fc_kwh/h2_kg)) / dist_km * 100
             ELSE NULL END AS metric_value,
        'kg/100km' AS metric_unit
      FROM base;

  # ========= 效率（LHV=33.5 kWh/kg）=========
  - id: StkEff
    name: "电堆效率(%)"
    unit: "%"
    prompt_sql: >
      WITH base AS (
        SELECT
          SUM((COALESCE(TRY_CAST(StkCurr AS DOUBLE),0)*COALESCE(TRY_CAST(StkVolt AS DOUBLE),0))/1000.0/3600.0) AS stk_kwh,
          SUM(
            (COALESCE(TRY_CAST(StkCurr AS DOUBLE), 0))
            / 2.016 / 96485 * 2
            / 3600
            * {{stk_cell_count}}
            / {{stk_h2_corr}}
          ) AS h2_kg
        FROM t
      )
      SELECT
        'StkEff' AS metric_id,
        '电堆效率(%)' AS metric_name,
        CASE WHEN h2_kg>0 THEN stk_kwh/(h2_kg*33.5)*100 ELSE NULL END AS metric_value,
        '%' AS metric_unit
      FROM base;

  - id: FcSysEff
    name: "燃料电池系统效率(%)"
    unit: "%"
    prompt_sql: >
      WITH base AS (
        SELECT
          (
            SUM((COALESCE(TRY_CAST(DcfCurrOut AS DOUBLE),0)*COALESCE(TRY_CAST(DcfVoltOut AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(WcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(WcpVolt AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(HrbCurr AS DOUBLE),0)*COALESCE(TRY_CAST(HrbVolt AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(AcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(AcpVolt AS DOUBLE),0))/1000.0/3600.0)
          ) AS fc_kwh,
          SUM(
            (COALESCE(TRY_CAST(StkCurr AS DOUBLE), 0))
            / 2.016 / 96485 * 2
            / 3600
            * {{stk_cell_count}}
            / {{stk_h2_corr}}
          ) AS h2_kg
        FROM t
      )
      SELECT
        'FcSysEff' AS metric_id,
        '燃料电池系统效率(%)' AS metric_name,
        CASE WHEN h2_kg>0 THEN fc_kwh/(h2_kg*33.5)*100 ELSE NULL END AS metric_value,
        '%' AS metric_unit
      FROM base;

  # ========= 百公里能耗（kWh/100km）=========
  - id: DrvEng_Dist
    name: "百公里驱动电机电耗(kWh/100km)"
    unit: "kWh/100km"
    prompt_sql: >
      WITH base AS (
        SELECT
          SUM(COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)/3600.0) AS dist_km,
          SUM((COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))/1000.0/3600.0) AS drv_kwh
        FROM t
      )
      SELECT
        'DrvEng_Dist' AS metric_id,
        '百公里驱动电机电耗(kWh/100km)' AS metric_name,
        CASE WHEN dist_km>0 THEN drv_kwh/dist_km*100 ELSE NULL END AS metric_value,
        'kWh/100km' AS metric_unit
      FROM base;

  - id: DrvEng_Pos_Dist
    name: "百公里驱动电机驱动电耗(kWh/100km)"
    unit: "kWh/100km"
    prompt_sql: >
      WITH base AS (
        SELECT
          SUM(COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)/3600.0) AS dist_km,
          SUM(
            CASE WHEN (COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))>0
                 THEN (COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))/1000.0/3600.0
                 ELSE 0 END
          ) AS pos_kwh
        FROM t
      )
      SELECT
        'DrvEng_Pos_Dist' AS metric_id,
        '百公里驱动电机驱动电耗(kWh/100km)' AS metric_name,
        CASE WHEN dist_km>0 THEN pos_kwh/dist_km*100 ELSE NULL END AS metric_value,
        'kWh/100km' AS metric_unit
      FROM base;

  - id: DrvEng_Neg_Dist
    name: "百公里驱动电机回馈电量(kWh/100km)"
    unit: "kWh/100km"
    prompt_sql: >
      WITH base AS (
        SELECT
          SUM(COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)/3600.0) AS dist_km,
          SUM(
            CASE WHEN (COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))<0
                 THEN -(COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))/1000.0/3600.0
                 ELSE 0 END
          ) AS neg_kwh
        FROM t
      )
      SELECT
        'DrvEng_Neg_Dist' AS metric_id,
        '百公里驱动电机回馈电量(kWh/100km)' AS metric_name,
        CASE WHEN dist_km>0 THEN neg_kwh/dist_km*100 ELSE NULL END AS metric_value,
        'kWh/100km' AS metric_unit
      FROM base;

  - id: AuxEng_Dist
    name: "百公里整车附件电耗(kWh/100km)"
    unit: "kWh/100km"
    prompt_sql: >
      WITH base AS (
        SELECT
          SUM(COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)/3600.0) AS dist_km,
          (
            (
              SUM((COALESCE(TRY_CAST(DcfCurrOut AS DOUBLE),0)*COALESCE(TRY_CAST(DcfVoltOut AS DOUBLE),0))/1000.0/3600.0)
              - SUM((COALESCE(TRY_CAST(WcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(WcpVolt AS DOUBLE),0))/1000.0/3600.0)
              - SUM((COALESCE(TRY_CAST(HrbCurr AS DOUBLE),0)*COALESCE(TRY_CAST(HrbVolt AS DOUBLE),0))/1000.0/3600.0)
              - SUM((COALESCE(TRY_CAST(AcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(AcpVolt AS DOUBLE),0))/1000.0/3600.0)
            )
            + SUM((COALESCE(TRY_CAST(BattCurr AS DOUBLE),0)*COALESCE(TRY_CAST(BattVolt AS DOUBLE),0))/1000.0/3600.0)
            - SUM((COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))/1000.0/3600.0)
          ) AS aux_kwh
        FROM t
      )
