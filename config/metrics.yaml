  # ========= 行车段平均功率（DrvT 系列，VehSpd>0）=========
  - id: VehEng_DrvT
    name: "整车平均功率(行车)(kW)"
    unit: "kW"
    prompt_sql: >
      WITH base AS (
        SELECT
          SUM(CASE WHEN COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)>0 THEN 1 ELSE 0 END)/3600.0 AS hours_drv,
          SUM(
            CASE WHEN COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)>0 THEN
              (
                (
                  (COALESCE(TRY_CAST(DcfCurrOut AS DOUBLE),0)*COALESCE(TRY_CAST(DcfVoltOut AS DOUBLE),0))/1000.0
                  - (COALESCE(TRY_CAST(WcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(WcpVolt AS DOUBLE),0))/1000.0
                  - (COALESCE(TRY_CAST(HrbCurr AS DOUBLE),0)*COALESCE(TRY_CAST(HrbVolt AS DOUBLE),0))/1000.0
                  - (COALESCE(TRY_CAST(AcpCurr AS DOUBLE),0)*COALESCE(TRY_CAST(AcpVolt AS DOUBLE),0))/1000.0
                )
                + (COALESCE(TRY_CAST(BattCurr AS DOUBLE),0)*COALESCE(TRY_CAST(BattVolt AS DOUBLE),0))/1000.0
              )/3600.0
            ELSE 0 END
          ) AS veh_kwh_drv
        FROM t
      )
      SELECT
        'VehEng_DrvT' AS metric_id,
        '整车平均功率(行车)(kW)' AS metric_name,
        CASE WHEN hours_drv>0 THEN veh_kwh_drv/hours_drv ELSE NULL END AS metric_value,
        'kW' AS metric_unit
      FROM base;

  - id: DrvEng_DrvT
