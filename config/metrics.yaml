  - id: DrvEng_Neg_DrvT
    name: "驱动电机回馈平均功率(行车)(kW)"
    unit: "kW"
    prompt_sql: >
      WITH base AS (
        SELECT
          SUM(CASE WHEN COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)>0 THEN 1 ELSE 0 END)/3600.0 AS hours_drv,
          SUM(
            CASE WHEN COALESCE(TRY_CAST(VehSpd AS DOUBLE),0)>0
                   AND (COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))<0
                 THEN -(COALESCE(TRY_CAST(MotCurr AS DOUBLE),0)*COALESCE(TRY_CAST(MotVolt AS DOUBLE),0))/1000.0/3600.0
                 ELSE 0 END
          ) AS neg_kwh_drv
        FROM t
      )
      SELECT
        'DrvEng_Neg_DrvT' AS metric_id,
        '驱动电机回馈平均功率(行车)(kW)' AS metric_name,
